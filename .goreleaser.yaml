version: 2

builds:
  - id: nilguard
    main: ./cmd/nilguard
    binary: nilguard
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

  - id: nilguard-vet
    main: ./cmd/nilguard-vet
    binary: nilguard-vet
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: nilguard
    builds:
      - nilguard
      - nilguard-vet
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: HMetcalfeW
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/HMetcalfe/nilguard"
    description: "Go static analyzer that enforces nil-check policy for pointer uses"
    license: "Apache-2.0"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
